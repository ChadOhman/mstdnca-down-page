<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="mstdn.ca is temporarily down for maintenance. Check status updates and play mini-games while you wait.">
    <title>mstdn.ca - Temporarily Down for Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #6364FF 0%, #563acc 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .message {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .status-link {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 8px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            transition: background 0.3s;
        }

        .status-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 2rem auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .game-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .game-instructions {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        canvas {
            background: #2b2d42;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .score {
            font-size: 1.2rem;
            margin-top: 1rem;
            font-weight: 600;
        }

        .controls {
            margin-top: 1rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px 5px;
            transition: background 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        button:focus {
            outline: 3px solid #ffffff;
            outline-offset: 2px;
            background: rgba(255, 255, 255, 0.3);
        }

        .status-link:focus {
            outline: 3px solid #ffffff;
            outline-offset: 2px;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        canvas:focus {
            outline: 3px solid #ffffff;
            outline-offset: 4px;
        }
    </style>
</head>
<body>
    <a href="#main-content" class="sr-only">Skip to main content</a>
    <main id="main-content">
        <div class="container">
            <div class="logo" role="img" aria-label="Mastodon logo">🦣</div>
            <h1 id="page-title">mstdn.ca is temporarily down</h1>
            <p class="message">We're currently performing maintenance. Please check back soon!</p>
            <a href="https://status.mstdn.ca" class="status-link" target="_blank" rel="noopener noreferrer" aria-label="Check maintenance status updates on status.mstdn.ca (opens in new tab)">Check Status Updates →</a>

            <section class="game-container" aria-labelledby="gameTitle">
                <h2 class="game-title" id="gameTitle">Loading...</h2>
                <p class="game-instructions" id="gameInstructions" aria-live="polite"></p>
                <canvas id="gameCanvas" width="600" height="400" role="application" aria-label="Game canvas" tabindex="0"></canvas>
                <div class="score" id="scoreDisplay" aria-live="polite" aria-atomic="true"></div>
                <div class="controls" id="controls" aria-live="polite"></div>
                <div role="group" aria-label="Game controls">
                    <button id="restartBtn" onclick="restartGame()" aria-label="Restart current game">Restart Game</button>
                    <button onclick="location.reload()" aria-label="Refresh page to load a different random game">Try Another Game</button>
                </div>
            </section>

            <p class="footer">While you wait, enjoy a mini-game! Refresh the page for a different game.</p>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let currentGame = null;
        let gameLoop = null;

        // Game 1: Snake
        class SnakeGame {
            constructor() {
                this.gridSize = 20;
                this.tileCount = 30;
                canvas.width = this.gridSize * this.tileCount;
                canvas.height = this.gridSize * this.tileCount;

                this.snake = [{x: 10, y: 10}];
                this.dx = 1;
                this.dy = 0;
                this.food = this.randomFood();
                this.score = 0;
                this.gameOver = false;
                this.gameOverAnnounced = false;

                // Touch support
                this.touchStartX = 0;
                this.touchStartY = 0;

                document.addEventListener('keydown', this.handleKeyPress.bind(this));
                canvas.addEventListener('touchstart', this.handleTouchStart.bind(this));
                canvas.addEventListener('touchend', this.handleTouchEnd.bind(this));
            }

            handleTouchStart(e) {
                e.preventDefault();
                const touch = e.touches[0];
                this.touchStartX = touch.clientX;
                this.touchStartY = touch.clientY;
            }

            handleTouchEnd(e) {
                if (this.gameOver) return;
                e.preventDefault();
                const touch = e.changedTouches[0];
                const deltaX = touch.clientX - this.touchStartX;
                const deltaY = touch.clientY - this.touchStartY;

                // Swipe detection
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    // Horizontal swipe
                    if (deltaX > 30 && this.dx === 0) {
                        this.dx = 1; this.dy = 0; // Right
                    } else if (deltaX < -30 && this.dx === 0) {
                        this.dx = -1; this.dy = 0; // Left
                    }
                } else {
                    // Vertical swipe
                    if (deltaY > 30 && this.dy === 0) {
                        this.dx = 0; this.dy = 1; // Down
                    } else if (deltaY < -30 && this.dy === 0) {
                        this.dx = 0; this.dy = -1; // Up
                    }
                }
            }

            randomFood() {
                return {
                    x: Math.floor(Math.random() * this.tileCount),
                    y: Math.floor(Math.random() * this.tileCount)
                };
            }

            handleKeyPress(e) {
                if (this.gameOver) return;

                if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && this.dy === 0) {
                    this.dx = 0; this.dy = -1;
                } else if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && this.dy === 0) {
                    this.dx = 0; this.dy = 1;
                } else if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && this.dx === 0) {
                    this.dx = -1; this.dy = 0;
                } else if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && this.dx === 0) {
                    this.dx = 1; this.dy = 0;
                }
            }

            update() {
                if (this.gameOver) return;

                const head = {
                    x: this.snake[0].x + this.dx,
                    y: this.snake[0].y + this.dy
                };

                if (head.x < 0 || head.x >= this.tileCount ||
                    head.y < 0 || head.y >= this.tileCount ||
                    this.snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                    this.gameOver = true;
                    if (!this.gameOverAnnounced && window.announceToScreenReader) {
                        window.announceToScreenReader(`Game Over! Final score: ${this.score}`);
                        this.gameOverAnnounced = true;
                    }
                    return;
                }

                this.snake.unshift(head);

                if (head.x === this.food.x && head.y === this.food.y) {
                    this.score += 10;
                    this.food = this.randomFood();
                } else {
                    this.snake.pop();
                }
            }

            draw() {
                ctx.fillStyle = '#2b2d42';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#6364FF';
                this.snake.forEach(segment => {
                    ctx.fillRect(
                        segment.x * this.gridSize,
                        segment.y * this.gridSize,
                        this.gridSize - 2,
                        this.gridSize - 2
                    );
                });

                ctx.fillStyle = '#ff006e';
                ctx.fillRect(
                    this.food.x * this.gridSize,
                    this.food.y * this.gridSize,
                    this.gridSize - 2,
                    this.gridSize - 2
                );

                document.getElementById('scoreDisplay').textContent = `Score: ${this.score}`;

                if (this.gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    ctx.font = '48px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2);
                    ctx.font = '24px Arial';
                    ctx.fillText(`Final Score: ${this.score}`, canvas.width / 2, canvas.height / 2 + 40);
                }
            }
        }

        // Game 2: Pong
        class PongGame {
            constructor() {
                canvas.width = 600;
                canvas.height = 400;

                this.paddleWidth = 10;
                this.paddleHeight = 80;
                this.ballSize = 10;

                this.leftPaddle = { x: 10, y: canvas.height / 2 - this.paddleHeight / 2 };
                this.rightPaddle = { x: canvas.width - 20, y: canvas.height / 2 - this.paddleHeight / 2 };
                this.ball = {
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    dx: 4,
                    dy: 4
                };

                this.leftScore = 0;
                this.rightScore = 0;
                this.keys = {};

                document.addEventListener('keydown', (e) => this.keys[e.key] = true);
                document.addEventListener('keyup', (e) => this.keys[e.key] = false);

                // Touch controls
                canvas.addEventListener('touchmove', this.handleTouchMove.bind(this));
                canvas.addEventListener('touchstart', this.handleTouchMove.bind(this));
            }

            handleTouchMove(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                for (let i = 0; i < e.touches.length; i++) {
                    const touch = e.touches[i];
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;

                    // Left half of screen controls left paddle
                    if (x < canvas.width / 2) {
                        this.leftPaddle.y = y - this.paddleHeight / 2;
                        if (this.leftPaddle.y < 0) this.leftPaddle.y = 0;
                        if (this.leftPaddle.y > canvas.height - this.paddleHeight) {
                            this.leftPaddle.y = canvas.height - this.paddleHeight;
                        }
                    }
                    // Right half controls right paddle
                    else {
                        this.rightPaddle.y = y - this.paddleHeight / 2;
                        if (this.rightPaddle.y < 0) this.rightPaddle.y = 0;
                        if (this.rightPaddle.y > canvas.height - this.paddleHeight) {
                            this.rightPaddle.y = canvas.height - this.paddleHeight;
                        }
                    }
                }
            }

            update() {
                if (this.keys['w'] && this.leftPaddle.y > 0) {
                    this.leftPaddle.y -= 6;
                }
                if (this.keys['s'] && this.leftPaddle.y < canvas.height - this.paddleHeight) {
                    this.leftPaddle.y += 6;
                }
                if (this.keys['ArrowUp'] && this.rightPaddle.y > 0) {
                    this.rightPaddle.y -= 6;
                }
                if (this.keys['ArrowDown'] && this.rightPaddle.y < canvas.height - this.paddleHeight) {
                    this.rightPaddle.y += 6;
                }

                this.ball.x += this.ball.dx;
                this.ball.y += this.ball.dy;

                if (this.ball.y <= 0 || this.ball.y >= canvas.height - this.ballSize) {
                    this.ball.dy *= -1;
                }

                if (this.ball.x <= this.leftPaddle.x + this.paddleWidth &&
                    this.ball.y >= this.leftPaddle.y &&
                    this.ball.y <= this.leftPaddle.y + this.paddleHeight) {
                    this.ball.dx *= -1;
                    this.ball.x = this.leftPaddle.x + this.paddleWidth;
                }

                if (this.ball.x >= this.rightPaddle.x - this.ballSize &&
                    this.ball.y >= this.rightPaddle.y &&
                    this.ball.y <= this.rightPaddle.y + this.paddleHeight) {
                    this.ball.dx *= -1;
                    this.ball.x = this.rightPaddle.x - this.ballSize;
                }

                if (this.ball.x < 0) {
                    this.rightScore++;
                    this.resetBall();
                }
                if (this.ball.x > canvas.width) {
                    this.leftScore++;
                    this.resetBall();
                }
            }

            resetBall() {
                this.ball.x = canvas.width / 2;
                this.ball.y = canvas.height / 2;
                this.ball.dx = (Math.random() > 0.5 ? 1 : -1) * 4;
                this.ball.dy = (Math.random() > 0.5 ? 1 : -1) * 4;
            }

            draw() {
                ctx.fillStyle = '#2b2d42';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(canvas.width / 2, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = '#6364FF';
                ctx.fillRect(this.leftPaddle.x, this.leftPaddle.y, this.paddleWidth, this.paddleHeight);
                ctx.fillRect(this.rightPaddle.x, this.rightPaddle.y, this.paddleWidth, this.paddleHeight);

                ctx.fillStyle = '#ff006e';
                ctx.fillRect(this.ball.x, this.ball.y, this.ballSize, this.ballSize);

                document.getElementById('scoreDisplay').textContent = `Player 1: ${this.leftScore} | Player 2: ${this.rightScore}`;
            }
        }

        // Game 3: Breakout
        class BreakoutGame {
            constructor() {
                canvas.width = 600;
                canvas.height = 400;

                this.paddleWidth = 80;
                this.paddleHeight = 10;
                this.paddleX = canvas.width / 2 - this.paddleWidth / 2;
                this.paddleSpeed = 8;

                this.ballRadius = 8;
                this.ball = { x: canvas.width / 2, y: canvas.height - 30, dx: 4, dy: -4 };

                this.brickRowCount = 5;
                this.brickColumnCount = 8;
                this.brickWidth = 65;
                this.brickHeight = 20;
                this.brickPadding = 5;
                this.brickOffsetTop = 30;
                this.brickOffsetLeft = 20;

                this.bricks = [];
                for (let c = 0; c < this.brickColumnCount; c++) {
                    this.bricks[c] = [];
                    for (let r = 0; r < this.brickRowCount; r++) {
                        this.bricks[c][r] = { x: 0, y: 0, status: 1 };
                    }
                }

                this.score = 0;
                this.keys = {};
                this.gameOver = false;
                this.gameOverAnnounced = false;

                document.addEventListener('keydown', (e) => this.keys[e.key] = true);
                document.addEventListener('keyup', (e) => this.keys[e.key] = false);

                // Touch controls
                canvas.addEventListener('touchmove', this.handleTouchMove.bind(this));
                canvas.addEventListener('touchstart', this.handleTouchMove.bind(this));
            }

            handleTouchMove(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                this.paddleX = x - this.paddleWidth / 2;
                if (this.paddleX < 0) this.paddleX = 0;
                if (this.paddleX > canvas.width - this.paddleWidth) {
                    this.paddleX = canvas.width - this.paddleWidth;
                }
            }

            update() {
                if (this.gameOver) return;

                if ((this.keys['ArrowLeft'] || this.keys['a'] || this.keys['A']) && this.paddleX > 0) {
                    this.paddleX -= this.paddleSpeed;
                }
                if ((this.keys['ArrowRight'] || this.keys['d'] || this.keys['D']) && this.paddleX < canvas.width - this.paddleWidth) {
                    this.paddleX += this.paddleSpeed;
                }

                this.ball.x += this.ball.dx;
                this.ball.y += this.ball.dy;

                if (this.ball.x + this.ballRadius > canvas.width || this.ball.x - this.ballRadius < 0) {
                    this.ball.dx *= -1;
                }
                if (this.ball.y - this.ballRadius < 0) {
                    this.ball.dy *= -1;
                }

                if (this.ball.y + this.ballRadius > canvas.height - this.paddleHeight &&
                    this.ball.x > this.paddleX && this.ball.x < this.paddleX + this.paddleWidth) {
                    this.ball.dy *= -1;
                }

                if (this.ball.y + this.ballRadius > canvas.height) {
                    this.gameOver = true;
                    if (!this.gameOverAnnounced && window.announceToScreenReader) {
                        window.announceToScreenReader(`Game Over! Final score: ${this.score}`);
                        this.gameOverAnnounced = true;
                    }
                }

                for (let c = 0; c < this.brickColumnCount; c++) {
                    for (let r = 0; r < this.brickRowCount; r++) {
                        const b = this.bricks[c][r];
                        if (b.status === 1) {
                            if (this.ball.x > b.x && this.ball.x < b.x + this.brickWidth &&
                                this.ball.y > b.y && this.ball.y < b.y + this.brickHeight) {
                                this.ball.dy *= -1;
                                b.status = 0;
                                this.score += 10;
                            }
                        }
                    }
                }
            }

            draw() {
                ctx.fillStyle = '#2b2d42';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let c = 0; c < this.brickColumnCount; c++) {
                    for (let r = 0; r < this.brickRowCount; r++) {
                        if (this.bricks[c][r].status === 1) {
                            const brickX = c * (this.brickWidth + this.brickPadding) + this.brickOffsetLeft;
                            const brickY = r * (this.brickHeight + this.brickPadding) + this.brickOffsetTop;
                            this.bricks[c][r].x = brickX;
                            this.bricks[c][r].y = brickY;

                            ctx.fillStyle = '#6364FF';
                            ctx.fillRect(brickX, brickY, this.brickWidth, this.brickHeight);
                        }
                    }
                }

                ctx.fillStyle = '#6364FF';
                ctx.fillRect(this.paddleX, canvas.height - this.paddleHeight, this.paddleWidth, this.paddleHeight);

                ctx.fillStyle = '#ff006e';
                ctx.beginPath();
                ctx.arc(this.ball.x, this.ball.y, this.ballRadius, 0, Math.PI * 2);
                ctx.fill();

                document.getElementById('scoreDisplay').textContent = `Score: ${this.score}`;

                if (this.gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    ctx.font = '48px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2);
                    ctx.font = '24px Arial';
                    ctx.fillText(`Final Score: ${this.score}`, canvas.width / 2, canvas.height / 2 + 40);
                }
            }
        }

        // Game 4: Tetris
        class TetrisGame {
            constructor() {
                canvas.width = 300;
                canvas.height = 600;

                this.cols = 10;
                this.rows = 20;
                this.blockSize = 30;
                this.board = Array(this.rows).fill().map(() => Array(this.cols).fill(0));

                this.pieces = [
                    [[1,1,1,1]], // I
                    [[1,1],[1,1]], // O
                    [[0,1,0],[1,1,1]], // T
                    [[1,0,0],[1,1,1]], // L
                    [[0,0,1],[1,1,1]], // J
                    [[0,1,1],[1,1,0]], // S
                    [[1,1,0],[0,1,1]]  // Z
                ];

                this.colors = ['#ff006e', '#6364FF', '#00f5ff', '#ffd700', '#00ff00', '#ff4500', '#9370db'];

                this.currentPiece = null;
                this.currentX = 0;
                this.currentY = 0;
                this.currentColor = 0;

                this.score = 0;
                this.gameOver = false;
                this.gameOverAnnounced = false;
                this.dropCounter = 0;
                this.dropInterval = 30; // Drop every 30 frames (0.5 seconds at 60fps)

                // Touch controls
                this.touchLeft = false;
                this.touchRight = false;
                this.touchDown = false;
                this.touchRotate = false;
                this.lastTouchAction = 0;

                this.newPiece();

                document.addEventListener('keydown', this.handleKeyPress.bind(this));
                canvas.addEventListener('touchstart', this.handleTouchStart.bind(this));
                canvas.addEventListener('touchend', this.handleTouchEnd.bind(this));
            }

            handleTouchStart(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                // Bottom quarter of screen has touch controls
                if (y > canvas.height * 0.75) {
                    const zone = Math.floor(x / (canvas.width / 4));
                    if (zone === 0) this.handleKeyPress({key: 'a'}); // Left
                    else if (zone === 1) this.handleKeyPress({key: 'd'}); // Right
                    else if (zone === 2) this.handleKeyPress({key: 's'}); // Down
                    else if (zone === 3) this.handleKeyPress({key: 'w'}); // Rotate
                } else {
                    // Tap anywhere else to rotate
                    this.handleKeyPress({key: 'w'});
                }
            }

            handleTouchEnd(e) {
                e.preventDefault();
            }

            newPiece() {
                const pieceIndex = Math.floor(Math.random() * this.pieces.length);
                this.currentPiece = this.pieces[pieceIndex];
                this.currentColor = pieceIndex;
                this.currentX = Math.floor(this.cols / 2) - Math.floor(this.currentPiece[0].length / 2);
                this.currentY = 0;

                if (this.collides()) {
                    this.gameOver = true;
                    if (!this.gameOverAnnounced && window.announceToScreenReader) {
                        window.announceToScreenReader(`Game Over! Final score: ${this.score}`);
                        this.gameOverAnnounced = true;
                    }
                }
            }

            handleKeyPress(e) {
                if (this.gameOver) return;

                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    this.currentX--;
                    if (this.collides()) this.currentX++;
                } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    this.currentX++;
                    if (this.collides()) this.currentX--;
                } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                    this.currentY++;
                    if (this.collides()) {
                        this.currentY--;
                        this.merge();
                        this.clearLines();
                        this.newPiece();
                    }
                } else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') {
                    this.rotate();
                }
            }

            rotate() {
                const rotated = this.currentPiece[0].map((_, i) =>
                    this.currentPiece.map(row => row[i]).reverse()
                );
                const prev = this.currentPiece;
                this.currentPiece = rotated;
                if (this.collides()) {
                    this.currentPiece = prev;
                }
            }

            collides() {
                for (let y = 0; y < this.currentPiece.length; y++) {
                    for (let x = 0; x < this.currentPiece[y].length; x++) {
                        if (this.currentPiece[y][x]) {
                            const newX = this.currentX + x;
                            const newY = this.currentY + y;
                            if (newX < 0 || newX >= this.cols || newY >= this.rows) {
                                return true;
                            }
                            if (newY >= 0 && this.board[newY][newX]) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            merge() {
                for (let y = 0; y < this.currentPiece.length; y++) {
                    for (let x = 0; x < this.currentPiece[y].length; x++) {
                        if (this.currentPiece[y][x]) {
                            this.board[this.currentY + y][this.currentX + x] = this.currentColor + 1;
                        }
                    }
                }
            }

            clearLines() {
                let linesCleared = 0;
                for (let y = this.rows - 1; y >= 0; y--) {
                    if (this.board[y].every(cell => cell !== 0)) {
                        this.board.splice(y, 1);
                        this.board.unshift(Array(this.cols).fill(0));
                        linesCleared++;
                        y++;
                    }
                }
                if (linesCleared > 0) {
                    this.score += linesCleared * 100;
                }
            }

            update() {
                if (this.gameOver) return;

                this.dropCounter++;
                if (this.dropCounter >= this.dropInterval) {
                    this.dropCounter = 0;
                    this.currentY++;
                    if (this.collides()) {
                        this.currentY--;
                        this.merge();
                        this.clearLines();
                        this.newPiece();
                    }
                }
            }

            draw() {
                ctx.fillStyle = '#2b2d42';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw board
                for (let y = 0; y < this.rows; y++) {
                    for (let x = 0; x < this.cols; x++) {
                        if (this.board[y][x]) {
                            ctx.fillStyle = this.colors[this.board[y][x] - 1];
                            ctx.fillRect(x * this.blockSize, y * this.blockSize, this.blockSize - 1, this.blockSize - 1);
                        }
                    }
                }

                // Draw current piece
                if (this.currentPiece) {
                    ctx.fillStyle = this.colors[this.currentColor];
                    for (let y = 0; y < this.currentPiece.length; y++) {
                        for (let x = 0; x < this.currentPiece[y].length; x++) {
                            if (this.currentPiece[y][x]) {
                                ctx.fillRect(
                                    (this.currentX + x) * this.blockSize,
                                    (this.currentY + y) * this.blockSize,
                                    this.blockSize - 1,
                                    this.blockSize - 1
                                );
                            }
                        }
                    }
                }

                document.getElementById('scoreDisplay').textContent = `Score: ${this.score}`;

                if (this.gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    ctx.font = '36px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2);
                    ctx.font = '20px Arial';
                    ctx.fillText(`Score: ${this.score}`, canvas.width / 2, canvas.height / 2 + 40);
                }
            }
        }

        // Game 5: Space Invaders
        class SpaceInvadersGame {
            constructor() {
                canvas.width = 600;
                canvas.height = 400;

                this.player = { x: canvas.width / 2 - 20, y: canvas.height - 40, width: 40, height: 20, speed: 6 };
                this.bullets = [];
                this.enemies = [];
                this.enemyBullets = [];

                for (let row = 0; row < 4; row++) {
                    for (let col = 0; col < 8; col++) {
                        this.enemies.push({
                            x: col * 60 + 50,
                            y: row * 40 + 40,
                            width: 30,
                            height: 20,
                            alive: true
                        });
                    }
                }

                this.enemyDirection = 1;
                this.enemySpeed = 1;
                this.score = 0;
                this.gameOver = false;
                this.gameOverAnnounced = false;
                this.keys = {};
                this.shootCooldown = 0;
                this.enemyShootTimer = 0;

                document.addEventListener('keydown', (e) => this.keys[e.key] = true);
                document.addEventListener('keyup', (e) => this.keys[e.key] = false);

                // Touch controls
                canvas.addEventListener('touchstart', this.handleTouchStart.bind(this));
                canvas.addEventListener('touchmove', this.handleTouchMove.bind(this));
                canvas.addEventListener('touchend', this.handleTouchEnd.bind(this));
            }

            handleTouchStart(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;

                // Tap to shoot
                if (!this.keys['touchShoot']) {
                    this.keys[' '] = true;
                    this.keys['touchShoot'] = true;
                    setTimeout(() => {
                        this.keys[' '] = false;
                        this.keys['touchShoot'] = false;
                    }, 100);
                }

                // Left/right movement
                if (x < canvas.width / 3) {
                    this.keys['ArrowLeft'] = true;
                } else if (x > canvas.width * 2/3) {
                    this.keys['ArrowRight'] = true;
                }
            }

            handleTouchMove(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;

                // Reset keys
                this.keys['ArrowLeft'] = false;
                this.keys['ArrowRight'] = false;

                // Set based on position
                if (x < canvas.width / 3) {
                    this.keys['ArrowLeft'] = true;
                } else if (x > canvas.width * 2/3) {
                    this.keys['ArrowRight'] = true;
                }
            }

            handleTouchEnd(e) {
                e.preventDefault();
                this.keys['ArrowLeft'] = false;
                this.keys['ArrowRight'] = false;
            }

            update() {
                if (this.gameOver) return;

                if ((this.keys['ArrowLeft'] || this.keys['a'] || this.keys['A']) && this.player.x > 0) {
                    this.player.x -= this.player.speed;
                }
                if ((this.keys['ArrowRight'] || this.keys['d'] || this.keys['D']) && this.player.x < canvas.width - this.player.width) {
                    this.player.x += this.player.speed;
                }

                if (this.shootCooldown > 0) this.shootCooldown--;

                if (this.keys[' '] && this.shootCooldown === 0) {
                    this.bullets.push({
                        x: this.player.x + this.player.width / 2 - 2,
                        y: this.player.y,
                        width: 4,
                        height: 10,
                        speed: 7
                    });
                    this.shootCooldown = 15;
                }

                this.bullets.forEach((bullet, i) => {
                    bullet.y -= bullet.speed;
                    if (bullet.y < 0) {
                        this.bullets.splice(i, 1);
                    }
                });

                let moveDown = false;
                this.enemies.forEach(enemy => {
                    if (enemy.alive) {
                        enemy.x += this.enemyDirection * this.enemySpeed;
                        if (enemy.x <= 0 || enemy.x >= canvas.width - enemy.width) {
                            moveDown = true;
                        }
                    }
                });

                if (moveDown) {
                    this.enemyDirection *= -1;
                    this.enemies.forEach(enemy => {
                        if (enemy.alive) {
                            enemy.y += 20;
                            if (enemy.y > canvas.height - 60) {
                                this.gameOver = true;
                                if (!this.gameOverAnnounced && window.announceToScreenReader) {
                                    window.announceToScreenReader(`Game Over! Aliens invaded. Final score: ${this.score}`);
                                    this.gameOverAnnounced = true;
                                }
                            }
                        }
                    });
                }

                this.enemyShootTimer++;
                if (this.enemyShootTimer > 60) {
                    this.enemyShootTimer = 0;
                    const aliveEnemies = this.enemies.filter(e => e.alive);
                    if (aliveEnemies.length > 0) {
                        const shooter = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
                        this.enemyBullets.push({
                            x: shooter.x + shooter.width / 2 - 2,
                            y: shooter.y + shooter.height,
                            width: 4,
                            height: 10,
                            speed: 3
                        });
                    }
                }

                this.enemyBullets.forEach((bullet, i) => {
                    bullet.y += bullet.speed;
                    if (bullet.y > canvas.height) {
                        this.enemyBullets.splice(i, 1);
                    }
                    if (bullet.x > this.player.x && bullet.x < this.player.x + this.player.width &&
                        bullet.y > this.player.y && bullet.y < this.player.y + this.player.height) {
                        this.gameOver = true;
                        if (!this.gameOverAnnounced && window.announceToScreenReader) {
                            window.announceToScreenReader(`Game Over! You were hit. Final score: ${this.score}`);
                            this.gameOverAnnounced = true;
                        }
                    }
                });

                this.bullets.forEach((bullet, bulletIndex) => {
                    this.enemies.forEach(enemy => {
                        if (enemy.alive &&
                            bullet.x > enemy.x && bullet.x < enemy.x + enemy.width &&
                            bullet.y > enemy.y && bullet.y < enemy.y + enemy.height) {
                            enemy.alive = false;
                            this.bullets.splice(bulletIndex, 1);
                            this.score += 10;
                        }
                    });
                });

                if (this.enemies.every(e => !e.alive)) {
                    this.gameOver = true;
                    if (!this.gameOverAnnounced && window.announceToScreenReader) {
                        window.announceToScreenReader(`Victory! All aliens defeated. Final score: ${this.score}`);
                        this.gameOverAnnounced = true;
                    }
                }
            }

            draw() {
                ctx.fillStyle = '#000011';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#6364FF';
                ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);

                ctx.fillStyle = '#ffff00';
                this.bullets.forEach(bullet => {
                    ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                });

                ctx.fillStyle = '#ff006e';
                this.enemyBullets.forEach(bullet => {
                    ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                });

                ctx.fillStyle = '#00ff00';
                this.enemies.forEach(enemy => {
                    if (enemy.alive) {
                        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                    }
                });

                document.getElementById('scoreDisplay').textContent = `Score: ${this.score}`;

                if (this.gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    ctx.font = '48px Arial';
                    ctx.textAlign = 'center';
                    const message = this.enemies.every(e => !e.alive) ? 'You Win!' : 'Game Over!';
                    ctx.fillText(message, canvas.width / 2, canvas.height / 2);
                    ctx.font = '24px Arial';
                    ctx.fillText(`Final Score: ${this.score}`, canvas.width / 2, canvas.height / 2 + 40);
                }
            }
        }

        // Game 6: Asteroids
        class AsteroidsGame {
            constructor() {
                canvas.width = 600;
                canvas.height = 400;

                this.ship = {
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    angle: 0,
                    rotation: 0,
                    velocityX: 0,
                    velocityY: 0,
                    thrust: false,
                    size: 15
                };

                this.bullets = [];
                this.asteroids = [];
                this.score = 0;
                this.gameOver = false;
                this.gameOverAnnounced = false;
                this.keys = {};
                this.shootCooldown = 0;
                this.level = 1;

                // Touch controls
                this.touchLeft = false;
                this.touchRight = false;
                this.touchThrust = false;
                this.touchShoot = false;

                // Spawn initial asteroids
                this.spawnAsteroids(4);

                // Keyboard controls
                document.addEventListener('keydown', (e) => this.keys[e.key] = true);
                document.addEventListener('keyup', (e) => this.keys[e.key] = false);

                // Touch controls (for mobile)
                canvas.addEventListener('touchstart', this.handleTouchStart.bind(this));
                canvas.addEventListener('touchend', this.handleTouchEnd.bind(this));
                canvas.addEventListener('touchmove', (e) => e.preventDefault());
            }

            handleTouchStart(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touches = e.touches;

                for (let i = 0; i < touches.length; i++) {
                    const x = touches[i].clientX - rect.left;
                    const y = touches[i].clientY - rect.top;

                    // Left side = rotate left
                    if (x < canvas.width / 4) {
                        this.touchLeft = true;
                    }
                    // Right-left side = rotate right
                    else if (x < canvas.width / 2) {
                        this.touchRight = true;
                    }
                    // Right-middle = thrust
                    else if (x < canvas.width * 3/4) {
                        this.touchThrust = true;
                    }
                    // Right side = shoot
                    else {
                        this.touchShoot = true;
                    }
                }
            }

            handleTouchEnd(e) {
                e.preventDefault();
                this.touchLeft = false;
                this.touchRight = false;
                this.touchThrust = false;
                this.touchShoot = false;
            }

            spawnAsteroids(count) {
                for (let i = 0; i < count; i++) {
                    let x, y;
                    do {
                        x = Math.random() * canvas.width;
                        y = Math.random() * canvas.height;
                    } while (this.distance(x, y, this.ship.x, this.ship.y) < 100);

                    this.asteroids.push({
                        x: x,
                        y: y,
                        velocityX: (Math.random() - 0.5) * 2,
                        velocityY: (Math.random() - 0.5) * 2,
                        radius: 30,
                        vertices: this.generateAsteroidVertices(30)
                    });
                }
            }

            generateAsteroidVertices(radius) {
                const vertices = [];
                const numVertices = 8 + Math.floor(Math.random() * 4);
                for (let i = 0; i < numVertices; i++) {
                    const angle = (i / numVertices) * Math.PI * 2;
                    const variance = radius * (0.7 + Math.random() * 0.3);
                    vertices.push({ angle, distance: variance });
                }
                return vertices;
            }

            distance(x1, y1, x2, y2) {
                return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            }

            update() {
                if (this.gameOver) return;

                // Rotation (keyboard and touch)
                if (this.keys['ArrowLeft'] || this.keys['a'] || this.keys['A'] || this.touchLeft) {
                    this.ship.rotation = -0.1;
                } else if (this.keys['ArrowRight'] || this.keys['d'] || this.keys['D'] || this.touchRight) {
                    this.ship.rotation = 0.1;
                } else {
                    this.ship.rotation = 0;
                }
                this.ship.angle += this.ship.rotation;

                // Thrust (keyboard and touch)
                this.ship.thrust = this.keys['ArrowUp'] || this.keys['w'] || this.keys['W'] || this.touchThrust;
                if (this.ship.thrust) {
                    this.ship.velocityX += Math.cos(this.ship.angle) * 0.15;
                    this.ship.velocityY += Math.sin(this.ship.angle) * 0.15;
                }

                // Apply friction
                this.ship.velocityX *= 0.99;
                this.ship.velocityY *= 0.99;

                // Update ship position
                this.ship.x += this.ship.velocityX;
                this.ship.y += this.ship.velocityY;

                // Wrap around screen
                if (this.ship.x < 0) this.ship.x = canvas.width;
                if (this.ship.x > canvas.width) this.ship.x = 0;
                if (this.ship.y < 0) this.ship.y = canvas.height;
                if (this.ship.y > canvas.height) this.ship.y = 0;

                // Shooting (keyboard and touch)
                if (this.shootCooldown > 0) this.shootCooldown--;
                if ((this.keys[' '] || this.touchShoot) && this.shootCooldown === 0) {
                    this.bullets.push({
                        x: this.ship.x + Math.cos(this.ship.angle) * this.ship.size,
                        y: this.ship.y + Math.sin(this.ship.angle) * this.ship.size,
                        velocityX: Math.cos(this.ship.angle) * 5,
                        velocityY: Math.sin(this.ship.angle) * 5,
                        life: 60
                    });
                    this.shootCooldown = 10;
                }

                // Update bullets
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    this.bullets[i].x += this.bullets[i].velocityX;
                    this.bullets[i].y += this.bullets[i].velocityY;
                    this.bullets[i].life--;

                    if (this.bullets[i].life <= 0 ||
                        this.bullets[i].x < 0 || this.bullets[i].x > canvas.width ||
                        this.bullets[i].y < 0 || this.bullets[i].y > canvas.height) {
                        this.bullets.splice(i, 1);
                    }
                }

                // Update asteroids
                this.asteroids.forEach(asteroid => {
                    asteroid.x += asteroid.velocityX;
                    asteroid.y += asteroid.velocityY;

                    // Wrap around screen
                    if (asteroid.x < -asteroid.radius) asteroid.x = canvas.width + asteroid.radius;
                    if (asteroid.x > canvas.width + asteroid.radius) asteroid.x = -asteroid.radius;
                    if (asteroid.y < -asteroid.radius) asteroid.y = canvas.height + asteroid.radius;
                    if (asteroid.y > canvas.height + asteroid.radius) asteroid.y = -asteroid.radius;
                });

                // Check bullet-asteroid collisions
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    for (let j = this.asteroids.length - 1; j >= 0; j--) {
                        if (this.distance(this.bullets[i].x, this.bullets[i].y,
                                         this.asteroids[j].x, this.asteroids[j].y) < this.asteroids[j].radius) {
                            this.score += 10;

                            // Split asteroid if large enough
                            if (this.asteroids[j].radius > 15) {
                                const newRadius = this.asteroids[j].radius / 2;
                                for (let k = 0; k < 2; k++) {
                                    this.asteroids.push({
                                        x: this.asteroids[j].x,
                                        y: this.asteroids[j].y,
                                        velocityX: (Math.random() - 0.5) * 3,
                                        velocityY: (Math.random() - 0.5) * 3,
                                        radius: newRadius,
                                        vertices: this.generateAsteroidVertices(newRadius)
                                    });
                                }
                            }

                            this.asteroids.splice(j, 1);
                            this.bullets.splice(i, 1);
                            break;
                        }
                    }
                }

                // Check ship-asteroid collisions
                for (let i = 0; i < this.asteroids.length; i++) {
                    if (this.distance(this.ship.x, this.ship.y,
                                     this.asteroids[i].x, this.asteroids[i].y) < this.asteroids[i].radius + this.ship.size) {
                        this.gameOver = true;
                        if (!this.gameOverAnnounced && window.announceToScreenReader) {
                            window.announceToScreenReader(`Game Over! Final score: ${this.score}`);
                            this.gameOverAnnounced = true;
                        }
                        return;
                    }
                }

                // Level complete - spawn more asteroids
                if (this.asteroids.length === 0) {
                    this.level++;
                    this.spawnAsteroids(4 + this.level);
                }
            }

            draw() {
                // Background
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw stars
                ctx.fillStyle = '#ffffff';
                for (let i = 0; i < 50; i++) {
                    const x = (i * 73) % canvas.width;
                    const y = (i * 137) % canvas.height;
                    ctx.fillRect(x, y, 1, 1);
                }

                // Draw ship
                ctx.save();
                ctx.translate(this.ship.x, this.ship.y);
                ctx.rotate(this.ship.angle);
                ctx.strokeStyle = '#6364FF';
                ctx.fillStyle = '#6364FF';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.ship.size, 0);
                ctx.lineTo(-this.ship.size, this.ship.size / 2);
                ctx.lineTo(-this.ship.size / 2, 0);
                ctx.lineTo(-this.ship.size, -this.ship.size / 2);
                ctx.closePath();
                ctx.stroke();
                ctx.fill();

                // Thrust flame
                if (this.ship.thrust) {
                    ctx.fillStyle = '#ff006e';
                    ctx.beginPath();
                    ctx.moveTo(-this.ship.size / 2, 0);
                    ctx.lineTo(-this.ship.size * 1.5, this.ship.size / 3);
                    ctx.lineTo(-this.ship.size * 1.5, -this.ship.size / 3);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();

                // Draw bullets
                ctx.fillStyle = '#ffffff';
                this.bullets.forEach(bullet => {
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Draw asteroids
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                this.asteroids.forEach(asteroid => {
                    ctx.save();
                    ctx.translate(asteroid.x, asteroid.y);
                    ctx.beginPath();
                    asteroid.vertices.forEach((vertex, i) => {
                        const x = Math.cos(vertex.angle) * vertex.distance;
                        const y = Math.sin(vertex.angle) * vertex.distance;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    });
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                });

                // Draw mobile touch zones (semi-transparent)
                if ('ontouchstart' in window) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.fillRect(0, canvas.height - 60, canvas.width / 4, 60);
                    ctx.fillRect(canvas.width / 4, canvas.height - 60, canvas.width / 4, 60);
                    ctx.fillRect(canvas.width / 2, canvas.height - 60, canvas.width / 4, 60);
                    ctx.fillRect(canvas.width * 3/4, canvas.height - 60, canvas.width / 4, 60);

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.font = '14px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('⟲', canvas.width / 8, canvas.height - 30);
                    ctx.fillText('⟳', canvas.width * 3/8, canvas.height - 30);
                    ctx.fillText('↑', canvas.width * 5/8, canvas.height - 30);
                    ctx.fillText('●', canvas.width * 7/8, canvas.height - 30);
                }

                // Score and level
                document.getElementById('scoreDisplay').textContent = `Score: ${this.score} | Level: ${this.level}`;

                // Game over
                if (this.gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    ctx.font = '36px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2);
                    ctx.font = '20px Arial';
                    ctx.fillText(`Final Score: ${this.score}`, canvas.width / 2, canvas.height / 2 + 40);
                }
            }
        }

        // Game 7: Memory Match
        class MemoryGame {
            constructor() {
                canvas.width = 500;
                canvas.height = 500;

                this.cols = 4;
                this.rows = 4;
                this.cardWidth = 100;
                this.cardHeight = 100;
                this.padding = 15;

                const symbols = ['🦣', '💜', '🎮', '⭐', '🎨', '🎵', '🚀', '🌟'];
                const cards = [...symbols, ...symbols];
                this.cards = cards.sort(() => Math.random() - 0.5).map((symbol, i) => ({
                    symbol,
                    x: (i % this.cols) * (this.cardWidth + this.padding) + 10,
                    y: Math.floor(i / this.cols) * (this.cardHeight + this.padding) + 10,
                    flipped: false,
                    matched: false
                }));

                this.firstCard = null;
                this.secondCard = null;
                this.canClick = true;
                this.matches = 0;
                this.moves = 0;
                this.gameWonAnnounced = false;

                canvas.addEventListener('click', this.handleClick.bind(this));
            }

            handleClick(e) {
                if (!this.canClick) return;

                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                this.cards.forEach(card => {
                    if (!card.matched && !card.flipped &&
                        x > card.x && x < card.x + this.cardWidth &&
                        y > card.y && y < card.y + this.cardHeight) {

                        card.flipped = true;

                        if (!this.firstCard) {
                            this.firstCard = card;
                        } else if (!this.secondCard) {
                            this.secondCard = card;
                            this.moves++;
                            this.canClick = false;

                            setTimeout(() => {
                                if (this.firstCard.symbol === this.secondCard.symbol) {
                                    this.firstCard.matched = true;
                                    this.secondCard.matched = true;
                                    this.matches++;
                                    if (this.matches === 8 && !this.gameWonAnnounced && window.announceToScreenReader) {
                                        window.announceToScreenReader(`You Win! All pairs matched in ${this.moves} moves!`);
                                        this.gameWonAnnounced = true;
                                    }
                                } else {
                                    this.firstCard.flipped = false;
                                    this.secondCard.flipped = false;
                                }
                                this.firstCard = null;
                                this.secondCard = null;
                                this.canClick = true;
                            }, 1000);
                        }
                    }
                });
            }

            update() {
                // Memory game updates are event-driven
            }

            draw() {
                ctx.fillStyle = '#2b2d42';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                this.cards.forEach(card => {
                    if (card.matched) {
                        ctx.fillStyle = 'rgba(99, 100, 255, 0.3)';
                    } else if (card.flipped) {
                        ctx.fillStyle = '#6364FF';
                    } else {
                        ctx.fillStyle = '#563acc';
                    }

                    ctx.fillRect(card.x, card.y, this.cardWidth, this.cardHeight);

                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(card.x, card.y, this.cardWidth, this.cardHeight);

                    if (card.flipped || card.matched) {
                        ctx.font = '48px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(card.symbol, card.x + this.cardWidth / 2, card.y + this.cardHeight / 2);
                    }
                });

                document.getElementById('scoreDisplay').textContent = `Moves: ${this.moves} | Matches: ${this.matches}/8`;

                if (this.matches === 8) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    ctx.font = '48px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('You Win!', canvas.width / 2, canvas.height / 2);
                    ctx.font = '24px Arial';
                    ctx.fillText(`Completed in ${this.moves} moves!`, canvas.width / 2, canvas.height / 2 + 40);
                }
            }
        }

        const games = [
            {
                name: 'Snake',
                class: SnakeGame,
                instructions: 'Use arrow keys or WASD to move. Eat the food and avoid hitting the walls or yourself!',
                controls: 'Keys: WASD/Arrows | Mobile: Swipe to change direction',
                fps: 10
            },
            {
                name: 'Pong',
                class: PongGame,
                instructions: 'Classic two-player Pong! First to score the most points wins.',
                controls: 'Keys: W/S & Arrows | Mobile: Touch left/right side to move paddles',
                fps: 60
            },
            {
                name: 'Breakout',
                class: BreakoutGame,
                instructions: 'Break all the bricks with the ball! Don\'t let it fall.',
                controls: 'Keys: A/D or Arrows | Mobile: Touch to move paddle',
                fps: 60
            },
            {
                name: 'Tetris',
                class: TetrisGame,
                instructions: 'Classic Tetris! Rotate and drop blocks to clear lines.',
                controls: 'Keys: WASD/Arrows | Mobile: 4 touch zones at bottom (◀▶▼⟳)',
                fps: 60
            },
            {
                name: 'Space Invaders',
                class: SpaceInvadersGame,
                instructions: 'Defend Earth from the alien invasion!',
                controls: 'Keys: A/D & Space | Mobile: Touch sides to move, tap to shoot',
                fps: 60
            },
            {
                name: 'Asteroids',
                class: AsteroidsGame,
                instructions: 'Classic arcade space shooter! Destroy asteroids and survive.',
                controls: 'WASD or Arrows: Rotate/Thrust | Space/Tap: Shoot | Touch: 4 zones on bottom',
                fps: 60
            },
            {
                name: 'Memory Match',
                class: MemoryGame,
                instructions: 'Click cards to flip them. Match all pairs to win!',
                controls: 'Click: Flip card | Goal: Match all 8 pairs',
                fps: 30
            }
        ];

        // Helper function to announce messages to screen readers
        window.announceToScreenReader = function(message) {
            const announcement = document.createElement('div');
            announcement.setAttribute('role', 'status');
            announcement.setAttribute('aria-live', 'assertive');
            announcement.className = 'sr-only';
            announcement.textContent = message;
            document.body.appendChild(announcement);

            setTimeout(() => {
                document.body.removeChild(announcement);
            }, 1000);
        };

        function startRandomGame() {
            const randomGame = games[Math.floor(Math.random() * games.length)];
            document.getElementById('gameTitle').textContent = randomGame.name;
            document.getElementById('gameInstructions').textContent = randomGame.instructions;
            document.getElementById('controls').textContent = randomGame.controls;

            // Update canvas aria-label with current game
            const canvas = document.getElementById('gameCanvas');
            canvas.setAttribute('aria-label', `${randomGame.name} game. ${randomGame.instructions}`);

            // Announce game start to screen readers
            announceToScreenReader(`${randomGame.name} game loaded. ${randomGame.instructions}`);

            currentGame = new randomGame.class();

            if (gameLoop) {
                clearInterval(gameLoop);
            }

            gameLoop = setInterval(() => {
                currentGame.update();
                currentGame.draw();
            }, 1000 / randomGame.fps);

            // Focus the canvas for keyboard interaction
            setTimeout(() => {
                canvas.focus();
            }, 100);
        }

        function restartGame() {
            if (gameLoop) {
                clearInterval(gameLoop);
            }
            announceToScreenReader('Game restarted');
            startRandomGame();
        }

        // Initialize the page
        startRandomGame();

        // Add keyboard shortcut hints
        document.addEventListener('DOMContentLoaded', () => {
            announceToScreenReader('Maintenance page loaded. mstdn.ca is temporarily down. A random mini-game has been loaded for you to play while you wait.');
        });
    </script>
</body>
