# Nginx Configuration for Mastodon Maintenance Page
# This configuration serves the maintenance page with a 503 Service Unavailable status

server {
    listen 80;
    listen [::]:80;
    server_name mstdn.ca www.mstdn.ca;

    # Optional: Redirect HTTP to HTTPS
    # return 301 https://$server_name$request_uri;

    # Root directory where index.html is located
    root /var/www/maintenance;

    # Serve the maintenance page for all requests with 503 status
    location / {
        try_files /index.html =503;
        add_header Retry-After 3600 always;  # Suggest retry after 1 hour (adjust as needed)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        return 503;
    }

    # Explicitly handle the index.html file
    location = /index.html {
        internal;
        add_header Retry-After 3600 always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Error page configuration
    error_page 503 /index.html;
}

# HTTPS Configuration (if using SSL/TLS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mstdn.ca www.mstdn.ca;

    # SSL Certificate paths (adjust to your certificate locations)
    ssl_certificate /etc/ssl/certs/mstdn.ca.crt;
    ssl_certificate_key /etc/ssl/private/mstdn.ca.key;

    # SSL Configuration (recommended settings)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Root directory where index.html is located
    root /var/www/maintenance;

    # Serve the maintenance page for all requests with 503 status
    location / {
        try_files /index.html =503;
        add_header Retry-After 3600 always;  # Suggest retry after 1 hour (adjust as needed)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        return 503;
    }

    # Explicitly handle the index.html file
    location = /index.html {
        internal;
        add_header Retry-After 3600 always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Error page configuration
    error_page 503 /index.html;
}
